apiVersion: apps/v1
kind: Deployment
metadata:
  name: nova-rewards-backend
  namespace: nova-rewards
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nova-rewards-backend
  template:
    metadata:
      labels:
        app: nova-rewards-backend
    spec:
      containers:
        - name: backend
          image: nova-rewards-backend:latest
          ports:
            - containerPort: 4000
          envFrom:
            - configMapRef:
                name: nova-rewards-config
            - secretRef:
                name: nova-rewards-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
